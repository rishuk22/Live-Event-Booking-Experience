<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Event Booking | Seat Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo-badge">LIVE</div>
        <div>
          <h1>SpotLight</h1>
          <p>Seat & time selection</p>
        </div>
      </div>
      <nav class="details-nav">
        <a href="details.html">Back to Event</a>
      </nav>
    </header>

    <main class="seats-layout">
      <section class="seats-panel">
        <div class="selection-summary">
          <span class="eyebrow accent">AI Suggestion • Best value seats</span>
          <h2 id="seatEventTitle">Select your seats</h2>
          <p id="seatEventMeta">Choose available seats and a time slot.</p>
        </div>

        <div class="time-slots">
          <button class="slot-btn active">6:00 PM</button>
          <button class="slot-btn">8:00 PM</button>
          <button class="slot-btn">10:00 PM</button>
        </div>

        <div class="seat-screen">STAGE</div>
        <div class="seat-grid" id="seatGrid">
          <!-- Seat buttons generated by JS -->
        </div>

        <div class="legend-row">
          <span><span class="legend-box available"></span>Available</span>
          <span><span class="legend-box selected"></span>Selected</span>
          <span><span class="legend-box booked"></span>Booked</span>
        </div>
      </section>

      <aside class="sidebar-panel">
        <div class="sticky-panel">
          <h3>Booking preview</h3>
          <p class="small-note">Recommended for 2 people</p>
          <div class="summary-card">
            <p><strong>Event</strong></p>
            <p id="sidebarEvent">The Rift</p>
          </div>
          <div class="summary-card">
            <p><strong>Selected seats</strong></p>
            <p id="selectedSeatsLabel">None yet</p>
          </div>
          <div class="summary-card">
            <p><strong>Time slot</strong></p>
            <p id="selectedTimeLabel">6:00 PM</p>
          </div>
          <div class="summary-card total-card">
            <p><strong>Subtotal</strong></p>
            <p id="subtotalLabel">₹0</p>
          </div>
          <button id="proceedSummaryBtn" class="primary-btn full-width" disabled>Continue to summary</button>
        </div>
      </aside>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
